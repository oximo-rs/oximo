name: Verify GAMS solver options

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout oximo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout gams_scraper
        uses: actions/checkout@v6
        with:
          repository: Godwinss24/GAM-SOLVERS
          ref: 9c99a7df802119ff98c34f31afd5aae97318a06c
          path: gams_scraper
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Scrape each solver and diff against its snapshot
        run: |
          mkdir -p /tmp/scraped
          fail=0
          for snapshot in crates/oximo-gams/option-snapshots/*.txt; do
            solver=$(basename "$snapshot" .txt)
            upper=$(echo "$solver" | tr '[:lower:]' '[:upper:]')
            new="/tmp/scraped/${solver}.txt"
            echo "Checking ${upper}..."
            cargo run --quiet --manifest-path gams_scraper/Cargo.toml -- "$upper" > "$new"
            if ! diff --strip-trailing-cr "$snapshot" "$new"; then
              echo "::error::${upper} options are out of date. Regenerate ${snapshot} from the scraper and update any typed options in crates/oximo-gams/src/solver_options.rs."
              fail=1
            fi
          done
          exit $fail
